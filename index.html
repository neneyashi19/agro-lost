<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fita VHS Interativa</title>

<style>
body {
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Tela VHS */
#player {
    width: 700px;
    height: 400px;
    background: #111;
    border: 4px solid #00ff88;
    padding: 20px;
    position: relative;
    box-shadow: 0 0 20px #00ff88;
}

/* Efeito ruído */
#player::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 2px
    );
    pointer-events: none;
}

/* Conteúdo */
#conteudo {
    font-size: 18px;
    min-height: 200px;
}

/* Botão */
button {
    background: #00ff88;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 20px;
    font-weight: bold;
}

button:hover {
    background: #00cc66;
}

/* Rodapé VHS */
.vhs-info {
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-size: 12px;
    color: #00ff88;
}
</style>
</head>

<body>

<div id="player">

    <div id="conteudo">
        <!-- Conteúdo muda aqui -->
    </div>

    <button onclick="proximo()">▶ Próximo Assunto</button>

    <div class="vhs-info">PLAY ► REC 1997</div>

</div>

<script>

/* Lista de "quadros" do filme */
const cenas = [
    "🌱 [Fita 01] Registro agrícola não catalogado... Um trator foi visto operando sozinho às 03:12 da manhã.",
    
    "📼 [Fita 02] Comercial de sementes transmitido apenas uma vez em 1998... nunca mais encontrado.",
    
    "📻 [Fita 03] Rádio rural captada fora de frequência... vozes repetiam coordenadas desconhecidas.",
    
    "🌽 [Fita 04] Filmagem de uma plantação onde todas as plantas cresceram em padrão geométrico.",
    
    "👁️ [Fita 05] Último registro... operador desapareceu após gravar esta fita."
];

let indice = 0;

/* Função para mudar de cena */
function proximo() {
    indice++;

    if (indice >= cenas.length) {
        indice = 0;
    }

    document.getElementById("conteudo").innerText = cenas[indice];
}

/* Iniciar com primeira cena */
document.getElementById("conteudo").innerText = cenas[0];

</script>

</body>
</html>
