<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fita VHS Corrompida</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Player */
#game {
    width: 750px;
    height: 420px;
    background: #000;
    border: 3px solid #00ff88;
    padding: 20px;
    position: relative;
    overflow: hidden;
}

/* Scanlines */
#game::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        rgba(255,255,255,0.05) 2px
    );
}

/* Glitch */
.glitch {
    animation: glitch 0.15s infinite;
}
@keyframes glitch {
    0% { transform: translate(3px); }
    50% { transform: translate(-3px); }
    100% { transform: translate(0); }
}

/* Texto */
#texto {
    white-space: pre-line;
    min-height: 200px;
}

/* Botões */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #00ff88;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #00cc66;
}

.info {
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-size: 12px;
}

/* Tela inicial */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: red;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 5;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="game">

    <div id="startScreen">
        <div>
            <h2>📼 CLIQUE PARA INSERIR A FITA</h2>
            <p>(ÁUDIO SERÁ ATIVADO)</p>
        </div>
    </div>

    <div id="texto"></div>
    <div id="opcoes"></div>
    <div class="info">PLAY ► REC ◼ 1997</div>

</div>

<!-- ÁUDIOS -->
<audio id="vhs" loop>
    <source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>

<audio id="glitchSound">
    <source src="https://www.fesliyanstudios.com/play-mp3/6681" type="audio/mpeg">
</audio>

<audio id="beep">
    <source src="https://www.fesliyanstudios.com/play-mp3/4387" type="audio/mpeg">
</audio>

<script>

/* HISTÓRIA */
const historia = {
    inicio: {
        texto: "📼 Carregando fita...\n\nERRO: ARQUIVO CORROMPIDO\n\nDeseja forçar reprodução?",
        opcoes: [
            { texto: "▶ FORÇAR", proximo: "fita1" },
            { texto: "❌ CANCELAR", proximo: "fim" }
        ]
    },

    fita1: {
        texto: "🌱 Plantação detectada...\n\n⚠ interferência...\n\nAlgo está se movendo.",
        opcoes: [
            { texto: "👁️ OBSERVAR", proximo: "olhar" },
            { texto: "⏩ AVANÇAR", proximo: "fita2" }
        ]
    },

    olhar: {
        texto: "👁️ PAUSA\n\nForma não identificada detectada.\n\nELA SABE QUE VOCÊ ESTÁ VENDO.",
        opcoes: [
            { texto: "▶ CONTINUAR", proximo: "fita2" }
        ]
    },

    fita2: {
        texto: "🚜 Trator ativo.\n\nÁUDIO INSTÁVEL:\n\n'você...vol...tou...'",
        opcoes: [
            { texto: "🔊 AUMENTAR VOLUME", proximo: "mensagem" },
            { texto: "⏹ PARAR", proximo: "fim" }
        ]
    },

    mensagem: {
        texto: "📻 SINAL CLARO:\n\n'NÃO ERA PRA VOCÊ ESTAR AQUI.'",
        opcoes: [
            { texto: "▶ CONTINUAR", proximo: "final" }
        ]
    },

    final: {
        texto: "⚠ FALHA CRÍTICA\n\nELE NÃO ESTÁ NA FITA\n\nELE ESTÁ AQUI",
        opcoes: [
            { texto: "🔁 REINICIAR", proximo: "inicio" }
        ]
    },

    fim: {
        texto: "❌ Fita interrompida.\n\n...\n\n(ruído continua)",
        opcoes: [
            { texto: "🔁 VOLTAR", proximo: "inicio" }
        ]
    }
};

let atual = "inicio";

const vhs = document.getElementById("vhs");
const glitchSound = document.getElementById("glitchSound");
const beep = document.getElementById("beep");

/* Iniciar áudio ao clicar */
document.getElementById("startScreen").onclick = () => {
    document.getElementById("startScreen").style.display = "none";
    vhs.volume = 0.3;
    vhs.play();
    mostrarCena(atual);
};

/* Digitação */
function escreverTexto(texto, el) {
    el.innerText = "";
    let i = 0;

    const interval = setInterval(() => {
        el.innerText += texto[i];
        i++;

        beep.currentTime = 0;
        beep.play();

        if (i >= texto.length) clearInterval(interval);

        /* glitch aleatório */
        if (Math.random() < 0.05) {
            glitch();
        }

    }, 30);
}

/* glitch visual + som */
function glitch() {
    document.getElementById("game").classList.add("glitch");
    glitchSound.currentTime = 0;
    glitchSound.play();

    setTimeout(() => {
        document.getElementById("game").classList.remove("glitch");
    }, 150);
}

/* Mostrar cena */
function mostrarCena(cena) {
    const dados = historia[cena];

    const textoEl = document.getElementById("texto");
    const opcoesEl = document.getElementById("opcoes");

    escreverTexto(dados.texto, textoEl);
    opcoesEl.innerHTML = "";

    dados.opcoes.forEach(op => {
        const btn = document.createElement("button");
        btn.innerText = op.texto;

        btn.onclick = () => {
            atual = op.proximo;
            mostrarCena(atual);
        };

        opcoesEl.appendChild(btn);
    });

    /* evento assustador aleatório */
    if (Math.random() < 0.3) {
        setTimeout(() => {
            textoEl.innerText += "\n\n⚠ INTERFERÊNCIA DETECTADA";
            glitch();
        }, 1500);
    }
}

</script>

</body>
</html>
